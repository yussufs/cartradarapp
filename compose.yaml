# Development database - DO NOT use these credentials in production
# Run with: docker compose up -d
services:
  db:
    image: postgres:16
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shopify_app
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
