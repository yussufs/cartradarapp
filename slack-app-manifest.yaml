display_information:
  name: Cart Radar
  description: High-value abandoned cart alerts
features:
  bot_user:
    display_name: Cart Radar
    always_online: false
oauth_config:
  redirect_urls:
    - https://cartradar.dragonapps.io/auth/slack/callback
  scopes:
    bot:
      - incoming-webhook
settings:
  incoming_webhooks:
    incoming_webhooks_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
